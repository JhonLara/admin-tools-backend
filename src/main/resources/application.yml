server:
  port: 8080

spring:
  application:
    name: admin-tools-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jackson:
    time-zone: ${TZ:America/Bogota}

jwt:
  secret: ${JWT_SECRET:admin-tools-default-secret-key-2026-change-in-prod}
  expiration: ${JWT_EXPIRATION:28800000}

telegram:
  enabled: true
  bot-token: ${TELEGRAM_BOT_TOKEN:}
  sales-chat-id: ${TELEGRAM_SALES_CHAT_ID:}
  aliados-chat-id: ${TELEGRAM_ALIADOS_CHAT_ID:}
  super-admin-chat-id: ${TELEGRAM_SUPER_ADMIN_CHAT_ID:}
