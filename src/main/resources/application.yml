server:
  port: ${PORT:8080}

spring:
  application:
    name: admin-tools-backend
  jackson:
    time-zone: ${TZ:America/Bogota}
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

---

spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:h2:mem:admintoolsdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: ${TZ:America/Bogota}
  h2:
    console:
      enabled: true
      path: /h2-console

jwt:
  secret: ${JWT_SECRET:admin-tools-default-secret-key-2026-change-in-prod}
  expiration: ${JWT_EXPIRATION:86400000}

telegram:
  enabled: true
  bot-token: ${TELEGRAM_BOT_TOKEN:}
  sales-chat-id: ${TELEGRAM_SALES_CHAT_ID:}
  aliados-chat-id: ${TELEGRAM_ALIADOS_CHAT_ID:}

logging:
  level:
    com.admintools: DEBUG

---

spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:admintools}?sslmode=require
    username: ${PGUSER:postgres}
    password: ${PGPASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: ${TZ:America/Bogota}

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}

telegram:
  enabled: true
  bot-token: ${TELEGRAM_BOT_TOKEN}
  sales-chat-id: ${TELEGRAM_SALES_CHAT_ID}
  aliados-chat-id: ${TELEGRAM_ALIADOS_CHAT_ID}

logging:
  level:
    com.admintools: INFO
